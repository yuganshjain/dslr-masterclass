<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans)}
  .nav{background:rgba(8,8,14,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
  .inner{padding:0 24px;height:64px;display:flex;align-items:center;gap:32px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .i{font-size:22px}
  .lt{font-weight:700;font-size:17px;letter-spacing:-0.3px}
  .la{color:#9d97ff}
  .links{display:flex;align-items:center;gap:4px;margin-left:auto}
  .link{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2)}
  .link .li{font-size:13px;opacity:0.8}
  .link.active{color:#9d97ff;background:rgba(124,111,247,0.12)}
</style></head><body>
<nav class="nav"><div class="inner">
  <div class="logo"><span class="i">📷</span><span class="lt">DSLR<span class="la">Masterclass</span></span></div>
  <div class="links">
    <a class="link active"><span class="li">⌂</span>Home</a>
    <a class="link"><span class="li">◈</span>Learn</a>
    <a class="link"><span class="li">◉</span>Simulate</a>
    <a class="link"><span class="li">◆</span>Quiz</a>
    <a class="link"><span class="li">◎</span>Glossary</a>
  </div>
</div></nav>
</body></html>
