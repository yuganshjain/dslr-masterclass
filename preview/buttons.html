<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:var(--font-sans)}
  .group{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:0.4px;text-transform:uppercase}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:8px;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s}
  .p{background:#7c6ff7;color:#fff}
  .p.hover{background:#9d97ff;box-shadow:0 4px 16px rgba(124,111,247,0.4);transform:translateY(-1px)}
  .p.press{background:#5548d4;transform:translateY(0)}
  .p.disabled{background:#353550;color:#55556a;cursor:not-allowed}
  .s{background:#16161f;color:var(--text);border:1px solid var(--border)}
  .s.hover{background:#1a1a26;border-color:#353550}
  .g{background:transparent;color:var(--text2);border:1px solid var(--border)}
  .g.hover{background:#16161f;color:var(--text)}
  .sm{padding:7px 14px;font-size:13px}
  .badge{font-family:var(--font-mono);font-size:9px;color:var(--text3);margin-left:4px}
</style></head><body>
<div class="group">
  <span class="lbl">Primary — rest / hover / press / disabled</span>
  <div class="row">
    <button class="btn p">Start Learning →</button>
    <button class="btn p hover">Start Learning →</button>
    <button class="btn p press">Start Learning →</button>
    <button class="btn p disabled">Start Learning →</button>
  </div>
</div>
<div class="group">
  <span class="lbl">Secondary / Ghost</span>
  <div class="row">
    <button class="btn s">Try Simulators</button>
    <button class="btn s hover">Try Simulators</button>
    <button class="btn g">View All →</button>
    <button class="btn g hover">View All →</button>
  </div>
</div>
<div class="group">
  <span class="lbl">Small — nav / inline</span>
  <div class="row">
    <button class="btn p sm">Take Quiz →</button>
    <button class="btn s sm">Skip</button>
    <button class="btn g sm">← Back</button>
  </div>
</div>
</body></html>
