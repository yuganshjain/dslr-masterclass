<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:40px 24px;background:var(--bg);color:var(--text);font-family:var(--font-sans);display:flex;gap:28px;justify-content:space-around;align-items:center}
  .box{width:130px;height:80px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--text2)}
  .s1{box-shadow:0 2px 12px rgba(0,0,0,0.35)}
  .s2{box-shadow:0 8px 32px rgba(0,0,0,0.5)}
  .s3{box-shadow:0 4px 16px rgba(124,111,247,0.4);background:var(--accent);border-color:var(--accent);color:#fff}
  .cap{text-align:center}
  .cap .name{font-size:11px;color:var(--text3);font-family:var(--font-mono);margin-top:10px}
</style></head><body>
<div class="cap"><div class="box s1">resting</div><div class="name">shadow2</div></div>
<div class="cap"><div class="box s2">hover</div><div class="name">shadow</div></div>
<div class="cap"><div class="box s3">primary</div><div class="name">glow-accent</div></div>
</body></html>
