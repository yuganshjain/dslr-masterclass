<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:12px}
  .card:hover{border-color:var(--border2);box-shadow:0 2px 12px rgba(0,0,0,0.35)}
  .top{display:flex;justify-content:space-between;align-items:flex-start}
  .iw{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7c6ff7,#22d3ee);font-size:22px;filter:brightness(2)}
  .iw2{background:linear-gradient(135deg,#f5a623,#ef4444)}
  .meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .dur{font-size:12px;color:var(--text3)}
  h3{margin:0;font-size:16px;font-weight:700;letter-spacing:-0.3px}
  p{margin:4px 0 0;font-size:13px;color:var(--text2);line-height:1.55}
  .badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .b1{background:rgba(34,197,94,0.12);color:#22c55e}
  .b2{background:rgba(245,166,35,0.12);color:#f5a623}
</style></head><body>
<div class="card">
  <div class="top">
    <div class="iw">◈</div>
    <div class="meta"><span class="badge b1">Beginner</span><span class="dur">⏱ 12 min</span></div>
  </div>
  <div><h3>Understanding Aperture</h3><p>How f-stops control depth of field and exposure.</p></div>
</div>
<div class="card">
  <div class="top">
    <div class="iw iw2">◉</div>
    <div class="meta"><span class="badge b2">Intermediate</span><span class="dur">⏱ 18 min</span></div>
  </div>
  <div><h3>Mastering Shutter Speed</h3><p>Freeze motion or blur it deliberately.</p></div>
</div>
</body></html>
