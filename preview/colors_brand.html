<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);color:var(--text);font-family:var(--font-sans)}
  .row{display:flex;gap:12px;margin-bottom:12px}
  .sw{flex:1;border-radius:var(--radius2);border:1px solid var(--border);overflow:hidden}
  .chip{height:64px;display:flex;align-items:flex-end;padding:8px 10px;color:#fff;font-family:var(--font-mono);font-size:11px;text-shadow:0 1px 2px rgba(0,0,0,0.6)}
  .meta{padding:8px 10px;display:flex;justify-content:space-between;align-items:baseline}
  .name{font-size:12px;font-weight:600;color:var(--text)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text3)}
  h4{font-size:11px;color:var(--text3);margin:0 0 8px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase}
</style></head><body>
<h4>Accent — Violet (brand)</h4>
<div class="row">
  <div class="sw"><div class="chip" style="background:#5548d4">accent3</div><div class="meta"><span class="name">accent3 press</span><span class="hex">#5548d4</span></div></div>
  <div class="sw"><div class="chip" style="background:#7c6ff7">accent</div><div class="meta"><span class="name">accent</span><span class="hex">#7c6ff7</span></div></div>
  <div class="sw"><div class="chip" style="background:#9d97ff">accent2</div><div class="meta"><span class="name">accent2 hover</span><span class="hex">#9d97ff</span></div></div>
</div>
<h4>Signature Gradient</h4>
<div class="row">
  <div class="sw" style="flex:3"><div class="chip" style="background:linear-gradient(135deg,#9d97ff,#22d3ee);height:72px;font-size:14px">linear-gradient(135deg, #9d97ff → #22d3ee)</div></div>
</div>
</body></html>
