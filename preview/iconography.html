<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .g{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--card)}
  .s{font-size:28px;color:var(--accent2)}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--text3)}
  .l{font-size:11px;color:var(--text2)}
</style></head><body>
<div class="grid">
  <div class="g"><div class="s">⌂</div><div class="l">Home</div><div class="n">U+2302</div></div>
  <div class="g"><div class="s">◈</div><div class="l">Learn</div><div class="n">U+25C8</div></div>
  <div class="g"><div class="s">◉</div><div class="l">Simulate</div><div class="n">U+25C9</div></div>
  <div class="g"><div class="s">◆</div><div class="l">Quiz</div><div class="n">U+25C6</div></div>
  <div class="g"><div class="s">⚙</div><div class="l">Tools</div><div class="n">U+2699</div></div>
  <div class="g"><div class="s">◇</div><div class="l">Cheatsheet</div><div class="n">U+25C7</div></div>
  <div class="g"><div class="s">◎</div><div class="l">Glossary</div><div class="n">U+25CE</div></div>
  <div class="g"><div class="s">△</div><div class="l">Triangle</div><div class="n">U+25B3</div></div>
  <div class="g"><div class="s">◑</div><div class="l">Scene</div><div class="n">U+25D1</div></div>
  <div class="g"><div class="s">⌕</div><div class="l">Search</div><div class="n">U+2315</div></div>
  <div class="g"><div class="s">→</div><div class="l">CTA arrow</div><div class="n">U+2192</div></div>
  <div class="g"><div class="s">✓</div><div class="l">Done</div><div class="n">U+2713</div></div>
</div>
</body></html>
