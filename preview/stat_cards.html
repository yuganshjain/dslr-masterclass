<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;text-align:center}
  .i{font-size:22px;color:#9d97ff;margin-bottom:10px}
  .v{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
  .l{font-size:13px;color:var(--text3);font-weight:500}
  .qc{grid-column:span 2;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;display:flex;gap:20px;align-items:center}
  .qi{font-size:26px;color:#f5a623}
  h3{margin:0;font-size:16px;font-weight:700}
  p{margin:2px 0 0;font-size:13px;color:var(--text2)}
  .btn{margin-left:auto;padding:8px 14px;border-radius:8px;border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;background:transparent}
</style></head><body>
<div class="sc"><div class="i">◈</div><div class="v">11</div><div class="l">Learning Modules</div></div>
<div class="sc"><div class="i">◆</div><div class="v">20</div><div class="l">Quiz Questions</div></div>
<div class="qc">
  <span class="qi">◇</span>
  <div><h3>Quick Reference</h3><p>Settings cheatsheet for any situation</p></div>
  <button class="btn">View Cheatsheet →</button>
</div>
</body></html>
