<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:var(--font-sans);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.3px}
  .b{background:rgba(34,197,94,0.12);color:#22c55e}
  .i{background:rgba(245,166,35,0.12);color:#f5a623}
  .a{background:rgba(239,68,68,0.12);color:#ef4444}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:30px;background:rgba(124,111,247,0.1);border:1px solid rgba(124,111,247,0.25);color:#9d97ff;font-size:13px;font-weight:600;letter-spacing:0.3px}
  .topic{padding:3px 10px;background:#16161f;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text3);font-weight:500}
  .done{background:#22c55e;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
</style></head><body>
<span class="badge b">Beginner</span>
<span class="badge i">Intermediate</span>
<span class="badge a">Advanced</span>
<span class="hero-badge"><span>📷</span> Complete DSLR Learning Platform</span>
<span class="topic">Aperture</span>
<span class="topic">ISO</span>
<span class="topic">Shutter</span>
<span class="done">✓ Done</span>
</body></html>
